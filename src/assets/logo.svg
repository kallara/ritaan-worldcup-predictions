<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Circle with Glow -->
  <circle cx="50" cy="50" r="46" fill="#090D16" stroke="url(#bgGlow)" stroke-width="3" filter="url(#glow)" />
  
  <!-- Outer Ring Details -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,2" />
  
  <!-- Football Pattern (Center Hexagon) -->
  <g fill="none" stroke="url(#bgGlow)" stroke-width="1.5" opacity="0.85">
    <!-- Center Hexagon -->
    <polygon points="50,38 60,44 60,56 50,62 40,56 40,44" fill="rgba(16, 185, 129, 0.1)" />
    <!-- Connecting Lines to Outer Circle -->
    <line x1="50" y1="38" x2="50" y2="24" />
    <line x1="60" y1="44" x2="72" y2="39" />
    <line x1="60" y1="56" x2="72" y2="61" />
    <line x1="50" y1="62" x2="50" y2="76" />
    <line x1="40" y1="56" x2="28" y2="61" />
    <line x1="40" y1="44" x2="28" y2="39" />
    <!-- Outer boundary of ball -->
    <circle cx="50" cy="50" r="26" stroke-dasharray="8,4" />
  </g>
  
  <!-- "RITAAN" text along path or centered -->
  <text x="50" y="52" font-family="'Outfit', sans-serif" font-weight="900" font-size="7" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">RITAAN</text>
  <text x="50" y="58" font-family="'Inter', sans-serif" font-weight="700" font-size="4.5" fill="#06B6D4" text-anchor="middle" letter-spacing="0.5">TVM</text>
</svg>
